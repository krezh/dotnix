pre-push:
  parallel: true
pre-commit:
  parallel: true
  commands:
    "Nix Format":
      glob: "*.nix"
      run: nixfmt {staged_files}
      stage_fixed: true
    "Govendor":
      glob: "*go.mod"
      run: govendor --check {staged_files}
    "Statix":
      glob: "*.nix"
      run: statix check
