---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Images

on:
  pull_request:
    branches:
      - "test-**"
  push:
    paths:
      - "images"
    branches:
      - "test-**"
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.event.number || forgejo.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.forgejo/actions/setup-nix
        with:
          skip-cache: true

      - name: Get image list
        id: set-matrix
        run: |
          images=$(nix eval --json '.#images' --apply 'builtins.attrNames' | jq -c '{include: map({image: .})}')
          echo "matrix=$images" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.image }}
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.forgejo/actions/setup-nix
        with:
          skip-cache: true

      - name: Garbage collect build dependencies
        run: nix-collect-garbage

      - name: Build ${{ matrix.image }} image
        id: build
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          set -o pipefail
          build_start=$(date +%s)

          nix build \
            ".#images.${IMAGE}" \
            --fallback \
            --log-format raw \
            --print-build-logs 2>&1 | tee build.log || {
            echo 'error-log<<EOF_ERROR_LOG' >> $GITHUB_OUTPUT
            grep -iE 'error|failed|cannot|fatal|panic' build.log | tail -n 100 || tail -n 50 build.log >> $GITHUB_OUTPUT
            echo 'EOF_ERROR_LOG' >> $GITHUB_OUTPUT
            exit 1
          }

          build_end=$(date +%s)
          build_duration=$((build_end - build_start))
          echo "build_duration=$build_duration" >> $GITHUB_OUTPUT

      - name: Get image info
        if: success()
        id: image-info
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          image_path=$(find -L result -type f \( -name "*.iso" -o -name "*.qcow2" -o -name "*.img" -o -name "*.raw" \))

          if [ -z "$image_path" ]; then
            echo "No image file found"
            echo "Contents:"
            ls -lR result/
            exit 1
          fi

          echo "Found image: $image_path"
          image_size=$(du -h "$image_path" | cut -f1)
          extension="${image_path##*.}"

          echo "path=$image_path" >> $GITHUB_OUTPUT
          echo "size=$image_size" >> $GITHUB_OUTPUT
          echo "extension=$extension" >> $GITHUB_OUTPUT

      - name: Upload image to package registry
        if: success()
        run: |
          response=$(curl -w "\n%{http_code}" --user "${{ forgejo.actor }}:${{ secrets.PACKAGE_TOKEN }}" \
            --upload-file "${{ steps.image-info.outputs.path }}" \
            "${{ forgejo.server_url }}/api/packages/${{ forgejo.repository_owner }}/generic/${{ matrix.image }}/${{ forgejo.sha }}/${{ matrix.image }}.${{ steps.image-info.outputs.extension }}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "HTTP Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "201" ]; then
            echo "Upload failed with status $http_code"
            exit 1
          fi
