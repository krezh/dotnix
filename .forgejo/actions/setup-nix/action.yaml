name: Setup Nix with Caching
description: Install Nix and configure cache
inputs:
  cachix-cache:
    description: Cachix cache name
    required: false
  cachix-token:
    description: Cachix authentication token
    required: false
  attic-endpoint:
    description: Attic cache endpoint
    required: false
  attic-cache:
    description: Attic cache name
    required: false
  attic-token:
    description: Attic authentication token
    required: false
  skip-cache:
    description: Skip cache setup
    required: false
    default: "false"
  skip-push:
    description: Skip cache push
    required: false
    default: "false"
  use-remote-builders:
    description: Enable remote builders
    required: false
    default: "false"
  remote-builders-ssh-key:
    description: SSH private key for remote builders
    required: false
    default: ""
  github-token:
    description: GitHub token for private repository access
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Setup SSH Key for Remote Builders
      if: inputs.use-remote-builders == 'true' && inputs.remote-builders-ssh-key != ''
      shell: bash
      env:
        SSH_KEY: ${{ inputs.remote-builders-ssh-key }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/nix-builder-key
        chmod 600 ~/.ssh/nix-builder-key
        cat >> ~/.ssh/config <<EOF
        Host *
          StrictHostKeyChecking accept-new
          IdentityFile ~/.ssh/nix-builder-key
        EOF
        chmod 600 ~/.ssh/config

    - name: Install Nix (with remote builders)
      if: inputs.use-remote-builders == 'true'
      uses: https://github.com/cachix/install-nix-action@08dcb3a5e62fa31e2460746e4209e94c1c7f1248 # v30
      with:
        extra_nix_config: |
          accept-flake-config = true
          always-allow-substitutes = true
          builders-use-substitutes = true
          builders = @${{ forgejo.workspace }}/.forgejo/nix-builders.conf
          ${{ inputs.github-token != '' && 'access-tokens = github.com=' || '' }}${{ inputs.github-token }}

    - name: Install Nix (local)
      if: inputs.use-remote-builders != 'true'
      uses: https://github.com/cachix/install-nix-action@08dcb3a5e62fa31e2460746e4209e94c1c7f1248 # v30
      with:
        extra_nix_config: |
          accept-flake-config = true
          always-allow-substitutes = true
          ${{ inputs.github-token != '' && 'access-tokens = github.com=' || '' }}${{ inputs.github-token }}

    - name: Setup Cachix
      if: inputs.skip-cache != 'true' && inputs.cachix-cache != '' && inputs.cachix-token != ''
      uses: https://github.com/cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      with:
        name: ${{ inputs.cachix-cache }}
        authToken: ${{ inputs.cachix-token }}
        skipPush: ${{ inputs.skip-push }}

    - name: Setup Attic
      if: inputs.skip-cache != 'true' && inputs.attic-endpoint != '' && inputs.attic-cache != '' && inputs.attic-token != ''
      uses: https://github.com/ryanccn/attic-action@1887fd507f03327c96c64cca30118c96eb17fdad # v0.4.1
      with:
        endpoint: ${{ inputs.attic-endpoint }}
        cache: ${{ inputs.attic-cache }}
        token: ${{ inputs.attic-token }}
