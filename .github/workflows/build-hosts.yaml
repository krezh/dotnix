---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Hosts

on:
  workflow_call:
    inputs:
      matrix:
        description: "Build matrix from nix-eval-jobs"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: ${{ fromJson(inputs.matrix || '{"include":[]}').include[0] != null }}
    runs-on: ${{ matrix.runner }}
    environment:
      name: prod
    strategy:
      matrix: ${{ fromJSON(inputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event.pull_request.head.repo.fork }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Host
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: ${{ matrix.target }}
          build-type: system
          output-link: result

      - name: Output build failure
        if: failure()
        id: output-failure
        shell: bash
        run: |
          drv=$(grep "For full logs, run" /tmp/nix-build-err.log | grep -oE '/nix/store/[^ ]+\.drv' | head -1 || true)
          if [ -n "$drv" ]; then
            nix log "$drv" || grep -v "dependencies of derivation.*failed to build" /tmp/nix-build-err.log | grep -A4 "^error:" || true
          else
            grep -v "dependencies of derivation.*failed to build" /tmp/nix-build-err.log | grep -A4 "^error:" || true
          fi > /tmp/error-log-out.txt
          cat /tmp/error-log-out.txt
          delimiter=$(openssl rand -hex 16)
          {
            echo "error-log<<${delimiter}"
            cat /tmp/error-log-out.txt
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: system
          build-name: ${{ matrix.attr }}
          build-status: ${{ steps.build.outcome }}
          flake-target: ${{ matrix.target }}
          error-log: ${{ steps.output-failure.outputs.error-log }}
          build-duration: ${{ steps.build.outputs.build_duration }}
          runner: ${{ matrix.runner }}
          pr-number: ${{ github.event.pull_request.number }}
