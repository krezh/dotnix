---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Hosts

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: ["main"]
    paths: &paths
      - "modules/**"
      - "lib/**"
      - "overlays/**"
      - "flake.nix"
      - "flake.lock"
      - "!pkgs/**"
  push:
    branches: ["main"]
    paths: *paths

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true
env:
  CACHE_NAME: krezh

jobs:
  detect-changes:
    name: Detect Changed Systems
    runs-on: ubuntu-latest
    outputs:
      changed-systems: ${{ steps.changed-systems.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get changed systems
        id: changed-systems
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: |
            modules/**
            lib/**
            overlays/**
            flake.nix
            flake.lock

  ghMatrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.changed-systems != '[]' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Restore Nix store cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        id: nix-cache
        with:
          path: /tmp/nix-cache
          key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          skip-cache: false
          nothing-but-nix: false

      - name: Import Nix store cache
        if: steps.nix-cache.outputs.cache-hit == 'true'
        run: nix copy --no-check-sigs --all --from /tmp/nix-cache

      - name: Run nix-eval-jobs
        run: |
          set -Eeu
          nix run nixpkgs#nix-eval-jobs -- \
            --flake .#hosts \
            --check-cache-status \
            --force-recurse \
            --gc-roots-dir /tmp/gcroots | \
              jq -sc 'map(select(.cacheStatus == "notBuilt"))' | jq

      - name: Export Nix store cache
        run: |
          sudo rm -rf /tmp/nix-cache
          nix copy --no-check-sigs --to /tmp/nix-cache .#gc-keep

      - id: set-matrix
        name: Generate Matrix
        env:
          CHANGED_SYSTEMS: ${{ needs.detect-changes.outputs.changed-systems }}
        run: |
          set -Eeu
          matrix=$(nix eval --json '.#ghMatrix' | jq -c) || exit 1
          systems="${CHANGED_SYSTEMS}"
          if [ -n "$systems" ] && [ "$systems" != "[]" ]; then
            # Extract host-specific changes (exclude shared modules directories)
            changed_hosts=$(echo "$systems" | jq -r '[.[] | select(startswith("modules/hosts/")) | split("/")[2] | select(length > 0)] | unique')
            has_shared=$(echo "$systems" | jq -r 'any((startswith("modules/hosts/") | not) or (startswith("modules/hosts/") and (split("/") | length) == 2))')

            if [ "$has_shared" = "false" ] && [ "$changed_hosts" != "[]" ]; then
              matrix=$(echo "$matrix" | jq -c --argjson hosts "$changed_hosts" '{include: [.include[] | select(.host as $h | $hosts | index($h))]}')
            fi
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  nix-build:
    name: Build ${{ matrix.host }}
    if: ${{ github.event.pull_request.draft != true && (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.changed-systems != '[]') }}
    needs: [detect-changes, ghMatrix]
    permissions:
      pull-requests: write
    environment:
      name: prod
    strategy:
      matrix: ${{ fromJSON(needs.ghMatrix.outputs.matrix) }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          use-remote-builders: false
          remote-builders-ssh-key: |
            ${{ secrets.REMOTE_BUILDERS_SSH_KEY }}

      - name: Build System
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: hosts.${{ matrix.host }}
          build-type: system
          output-link: result

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: system
          build-name: ${{ matrix.host }}
          build-status: ${{ steps.build.outcome }}
          flake-target: hosts.${{ matrix.host }}
          error-log: ${{ steps.build.outputs.error-log }}
          build-duration: ${{ steps.build.outputs.build_duration }}
          runner: ${{ matrix.runner }}
          pr-number: ${{ github.event.pull_request.number }}
