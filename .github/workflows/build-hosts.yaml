---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Hosts

on:
  workflow_call:
    inputs:
      matrix:
        description: "Build matrix from nix-eval-jobs"
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: ${{ fromJson(inputs.matrix || '{"include":[]}').include[0] != null }}
    runs-on: ${{ matrix.runner }}
    environment:
      name: prod
    strategy:
      matrix: ${{ fromJSON(inputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event.pull_request.head.repo.fork }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Host
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: ${{ matrix.target }}
          build-type: system
          output-link: result

      - name: Snapshot closure
        if: ${{ steps.build.outcome == 'success'}}
        env:
          HOST_NAME: ${{ matrix.name }}
        run: nix run .#ncd -- snapshot result --output "${HOST_NAME}.json"

      - name: Save snapshot
        if: ${{ steps.build.outcome == 'success' }}
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ matrix.name }}.json
          key: ncd-snapshot-${{ matrix.name }}

      - name: Restore snapshot
        if: ${{ steps.build.outcome == 'success' && github.event_name == 'pull_request' }}
        id: restore-snapshot
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ matrix.name }}.json
          key: ncd-snapshot-${{ matrix.name }}

      - name: Diff closure
        if: ${{ steps.build.outcome == 'success' && steps.restore-snapshot.outputs.cache-hit == 'true' }}
        id: diff
        env:
          HOST_NAME: ${{ matrix.name }}
        run: |
          diff=$(nix run .#ncd -- diff "${HOST_NAME}.json" result --color never --format diff)
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$diff" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          {
            echo "## Closure Diff: \`${HOST_NAME}\`"
            if [ -n "$diff" ]; then
              echo '```diff'
              echo "$diff"
              echo '```'
            else
              echo "No closure changes."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post diff comment
        if: ${{ github.event_name == 'pull_request' && steps.restore-snapshot.outputs.cache-hit == 'true' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          header: "Closure Diff: ${{ matrix.attr }}"
          delete: ${{ steps.diff.outputs.output == '' }}
          message: |
            ## 📦 Closure Diff: `${{ matrix.attr }}`
            ```diff
            ${{ steps.diff.outputs.output }}
            ```

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: system
          build-name: ${{ matrix.attr }}
          build-status: ${{ steps.build.outcome }}
          flake-target: ${{ matrix.target }}
          error-log: ${{ steps.build.outputs.error-log }}
          build-duration: ${{ steps.build.outputs.build_duration }}
          runner: ${{ matrix.runner }}
          pr-number: ${{ github.event.pull_request.number }}
