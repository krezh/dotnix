---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Hosts

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: ["main"]
    paths: &paths
      - "modules/**"
      - "lib/**"
      - "overlays/**"
      - "flake.nix"
      - "flake.lock"
      - "!pkgs/**"
  push:
    branches: ["main"]
    paths: *paths

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true
env:
  CACHE_NAME: krezh

jobs:
  ghMatrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    environment:
      name: prod
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-push: true
          nothing-but-nix: false

      - id: set-matrix
        name: Generate Matrix
        run: |
          set -Eeu
          matrix=$(nix run nixpkgs#nix-eval-jobs -- \
            --flake .#hosts \
            --allow-import-from-derivation \
            --check-cache-status \
            --force-recurse \
            --gc-roots-dir /tmp/gcroots | \
              jq -sc 'map(select(.cacheStatus == "notBuilt") | {
                host: (.attr | split(".") | .[1:] | join(".")),
                runner: (.attr | split(".")[0] | if . == "aarch64-linux" then "ubuntu-24.04-arm" else "ubuntu-latest" end)
              }) | {include: (sort_by(.host))}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"

  build-hosts:
    name: Build ${{ matrix.host }}
    needs: ghMatrix
    if: ${{ github.event.pull_request.draft != true && fromJson(needs.ghMatrix.outputs.matrix || '{"include":[]}').include[0] != null }}
    runs-on: ${{ matrix.runner }}
    permissions:
      pull-requests: write
    environment:
      name: prod
    strategy:
      matrix: ${{ fromJSON(needs.ghMatrix.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          use-remote-builders: false
          remote-builders-ssh-key: |
            ${{ secrets.REMOTE_BUILDERS_SSH_KEY }}

      - name: Build Host
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: hosts.${{ matrix.host }}
          build-type: system
          output-link: result

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: system
          build-name: ${{ matrix.host }}
          build-status: ${{ steps.build.outcome }}
          flake-target: hosts.${{ matrix.host }}
          error-log: ${{ steps.build.outputs.error-log }}
          build-duration: ${{ steps.build.outputs.build_duration }}
          runner: ${{ matrix.runner }}
          pr-number: ${{ github.event.pull_request.number }}
