---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Packages
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: ["main"]
    paths: &paths
      - "pkgs/**"
  push:
    branches: ["main"]
    paths: *paths

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true
env:
  CACHE_NAME: krezh

jobs:
  ghMatrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    environment:
      name: prod
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-push: true
          nothing-but-nix: false

      - id: set-matrix
        name: Generate Matrix
        run: |
          set -Eeu
          pkgs=$(nix run nixpkgs#nix-eval-jobs -- \
            --flake .#packages \
            --allow-import-from-derivation \
            --check-cache-status \
            --force-recurse \
            --gc-roots-dir /tmp/gcroots | \
              jq -sc 'map(select(.cacheStatus == "notBuilt") | {
                package: (.attr | split(".") | .[1:] | join(".")),
                runner: (.attr | split(".")[0] | if . == "aarch64-linux" then "ubuntu-24.04-arm" else "ubuntu-latest" end)
              }) | {include: (sort_by(.package))}')
          echo "packages=$pkgs" >> $GITHUB_OUTPUT

  build-packages:
    name: Build package ${{ matrix.package }}
    needs: ghMatrix
    if: ${{ fromJson(needs.ghMatrix.outputs.matrix).include[0] != null }}
    runs-on: ${{ matrix.runner }}
    permissions:
      pull-requests: write
    environment:
      name: prod
    continue-on-error: true
    strategy:
      matrix: ${{ fromJson(needs.ghMatrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix with caching
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          nothing-but-nix: false

      - name: Build package
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: ${{ matrix.package }}
          build-type: package

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: package
          build-name: ${{ matrix.package }}
          build-status: ${{ steps.build.outcome }}
          flake-target: ${{ matrix.package }}
          error-log: ${{ steps.build.outputs.error-log }}
          pr-number: ${{ github.event.pull_request.number }}
