---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Packages
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: ["main"]
    paths: &paths
      - "pkgs/**"
  push:
    branches: ["main"]
    paths: *paths

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true
env:
  CACHE_NAME: krezh

jobs:
  detect-packages:
    name: Detect Changed Packages
    runs-on: ubuntu-latest
    outputs:
      changed-packages: ${{ steps.extract-packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Get changed packages
        id: changed-packages
        uses: bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        with:
          patterns: pkgs/**
          include_only_directories: true

      - name: Extract package names
        id: extract-packages
        env:
          CHANGED_FILES: ${{ steps.changed-packages.outputs.changed_files }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Get all packages on manual trigger
            pkgs=$(nix eval .#packages.x86_64-linux --apply builtins.attrNames --json | jq -c)
            echo "packages=$pkgs" >> $GITHUB_OUTPUT
          elif [ "${CHANGED_FILES}" != "[]" ]; then
            # Get changed packages on PR/push
            files="${CHANGED_FILES}"
            pkgs=$(echo "$files" | jq -c '[.[] | split("/") | .[2]] | unique')
            echo "packages=$pkgs" >> $GITHUB_OUTPUT
          fi

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          skip-cache: false
          nothing-but-nix: false

      - name: Run nix-eval-jobs
        run: |
          set -Eeu
          nix run nixpkgs#nix-eval-jobs -- \
            --flake .#packages \
            --allow-import-from-derivation \
            --check-cache-status \
            --force-recurse \
            --gc-roots-dir /tmp/gcroots | \
              jq -sc 'map(select(.cacheStatus == "notBuilt") | .attr) | sort'

  build-packages:
    name: Build package ${{ matrix.package }}
    needs: detect-packages
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-packages.outputs.changed-packages != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    environment:
      name: prod
    continue-on-error: true
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.changed-packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix with caching
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-cache: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
          nothing-but-nix: false

      - name: Build package
        id: build
        uses: ./.github/actions/nix-build
        with:
          target: ${{ matrix.package }}
          build-type: package

      - name: Post build comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: ./.github/actions/post-build-comment
        with:
          build-type: package
          build-name: ${{ matrix.package }}
          build-status: ${{ steps.build.outcome }}
          flake-target: ${{ matrix.package }}
          error-log: ${{ steps.build.outputs.error-log }}
          pr-number: ${{ github.event.pull_request.number }}
