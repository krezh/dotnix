---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build CI

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches: ["main"]
    paths: &paths
      - "**/*.nix"
      - "pkgs/**"
      - "flake.nix"
      - "flake.lock"
  push:
    branches: ["main"]
    paths: *paths

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    environment:
      name: prod
    outputs:
      hosts: ${{ steps.set-matrix.outputs.hosts }}
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          attic-endpoint: https://nix-cache.plexuz.xyz
          attic-cache: ${{ secrets.ATTIC_CACHE }}
          attic-token: ${{ secrets.ATTIC_TOKEN }}
          skip-push: false
          nothing-but-nix: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nix-eval-jobs
        run: nix profile install nixpkgs#nix-eval-jobs

      - name: Generate Matrix
        id: set-matrix
        timeout-minutes: 15
        run: |
          set -Eeuo pipefail
          result=$(nix-eval-jobs \
            --flake .#ci \
            --check-cache-status \
            --force-recurse \
            --workers $(nproc) \
            --gc-roots-dir /tmp/gcroots | \
            jq -sc 'if any(.error != null) then (map(select(.error != null) | "\(.attr): \(.error)") | "❌ Evaluation errors:\n" + join("\n")) | halt_error(1) else map(select(.cacheStatus == "notBuilt") | {
              attr: .attr,
              neededBuilds: .neededBuilds,
              target: (.attr | ltrimstr("packages.")),
              name: (.attr | ltrimstr("hosts.") | ltrimstr("packages.")),
              runner: (.system | if . == "aarch64-linux" then "ubuntu-24.04-arm" else "ubuntu-latest" end)
            }) end')

          echo "hosts=$(echo "$all" | jq -c '{include: [.[] | select(.attr | startswith("hosts."))]}')" >> "$GITHUB_OUTPUT"
          echo "packages=$(echo "$all" | jq -c '{include: [.[] | select(.attr | startswith("packages."))]}')" >> "$GITHUB_OUTPUT"

          {
            echo "## Derivations to Build"
            hosts_count=$(echo "$all" | jq '[.[] | select(.attr | startswith("hosts."))] | length')
            packages_count=$(echo "$all" | jq '[.[] | select(.attr | startswith("packages."))] | length')
            if [ "$hosts_count" -eq 0 ] && [ "$packages_count" -eq 0 ]; then
              echo "All derivations are cached — nothing to build."
            else
              if [ "$hosts_count" -gt 0 ]; then
                echo "### Hosts ($hosts_count)"
                echo "$all" | jq -r '.[] | select(.attr | startswith("hosts.")) | "- `\(.attr)`"'
              fi
              if [ "$packages_count" -gt 0 ]; then
                echo "### Packages ($packages_count)"
                echo "$all" | jq -r '.[] | select(.attr | startswith("packages.")) | "- `\(.attr)`"'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-hosts:
    name: Build Hosts
    needs: generate-matrix
    if: ${{ github.event.pull_request.draft != true &&
      fromJson(needs.generate-matrix.outputs.hosts ||
      '{"include":[]}').include[0] != null }}
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build-hosts.yaml # zizmor: ignore[secrets-inherit]
    secrets: inherit
    with:
      matrix: ${{ needs.generate-matrix.outputs.hosts }}

  build-packages:
    name: Build Packages
    needs: generate-matrix
    if: ${{ fromJson(needs.generate-matrix.outputs.packages ||
      '{"include":[]}').include[0] != null }}
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/build-packages.yaml # zizmor: ignore[secrets-inherit]
    secrets: inherit
    with:
      matrix: ${{ needs.generate-matrix.outputs.packages }}
