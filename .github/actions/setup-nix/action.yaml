name: Setup Nix with Caching
description: Install Nix and configure cache
inputs:
  cachix-cache:
    description: Cachix cache name
    required: false
  cachix-token:
    description: Cachix authentication token
    required: false
  attic-endpoint:
    description: Attic cache endpoint
    required: false
  attic-cache:
    description: Attic cache name
    required: false
  attic-token:
    description: Attic authentication token
    required: false
  skip-cache:
    description: Skip cache setup
    required: false
    default: "false"
  skip-push:
    description: Skip cache push
    required: false
    default: "false"
  use-remote-builders:
    description: Enable remote builders
    required: false
    default: "false"
  remote-builders-ssh-key:
    description: SSH private key for remote builders
    required: false
    default: ""
  nothing-but-nix:
    description: Enable nothing-but-nix mode (uses /nix/build as build directory)
    required: false
    default: "true"
  github-token:
    description: GitHub token for private repository access
    required: false
    default: ""
  enable-kvm:
    description: Enable KVM
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Nothing But Nix
      if: inputs.nothing-but-nix == 'true'
      uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
      with:
        hatchet-protocol: cleave
        nix-permission-edict: true

    - name: Install Lix
      shell: bash
      env:
        ENABLE_KVM: ${{ inputs.enable-kvm }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        enable_kvm() {
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-install-lix-action-kvm.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm
        }
        if [[ "$(uname -s)" == "Linux" && "$ENABLE_KVM" == 'true' ]]; then
          enable_kvm && echo 'Enabled KVM' || echo 'KVM is not available'
        fi
        nix_config=(
          "experimental-features = nix-command flakes"
          "accept-flake-config = true"
          "sandbox = true"
          "sandbox-fallback = false"
          "trusted-users = root runner"
        )
        [[ -n "$GITHUB_TOKEN" ]] && nix_config+=("access-tokens = github.com=$GITHUB_TOKEN")
        extra_conf=()
        for conf in "${nix_config[@]}"; do extra_conf+=(--extra-conf="$conf"); done
        echo "Downloading and running Lix installer..."
        curl -sSf -L https://install.lix.systems/lix | bash -s -- install linux \
          --no-confirm --force --enable-flakes \
          "${extra_conf[@]}"
        echo "Running Nix profile..."
        . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        echo "Making sure Nix is installed and on PATH..."
        nix --version

    - name: Setup Cachix
      if: inputs.skip-cache != 'true' && inputs.cachix-cache != '' && inputs.cachix-token != ''
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: ${{ inputs.cachix-cache }}
        authToken: ${{ inputs.cachix-token }}
        skipPush: ${{ inputs.skip-push }}

    - name: Setup Attic
      if: inputs.skip-cache != 'true' && inputs.attic-endpoint != '' && inputs.attic-cache != '' && inputs.attic-token != ''
      uses: ryanccn/attic-action@1887fd507f03327c96c64cca30118c96eb17fdad # v0.4.1
      with:
        endpoint: ${{ inputs.attic-endpoint }}
        cache: ${{ inputs.attic-cache }}
        token: ${{ inputs.attic-token }}
