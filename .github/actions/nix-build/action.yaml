---
name: "Nix Build"
description: "Build a Nix flake target with standardized error capture and logging"
author: "krezh"

inputs:
  target:
    description: "Flake target to build (e.g., package-name or top.hostname)"
    required: true
  build-type:
    description: "Type of build (package or system)"
    required: true
  extra-args:
    description: "Extra nix build arguments"
    required: false
    default: ""
  output-link:
    description: "Path for the result symlink (-o flag)"
    required: false
    default: ""

outputs:
  success:
    description: "Whether the build succeeded"
    value: ${{ steps.build.outcome == 'success' }}
  error-log:
    description: "Extracted error log content"
    value: ${{ steps.build.outputs.error-log }}
  build_duration:
    description: "Build duration in seconds"
    value: ${{ steps.build.outputs.build_duration }}

runs:
  using: "composite"
  steps:
    - name: Build ${{ inputs.build-type }}
      id: build
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -o pipefail
        build_start=$(date +%s)

        # Construct nix build command
        nix_cmd="nix build --fallback --no-write-lock-file --log-format raw \".#${INPUT_TARGET}\""

        # Add output link if specified
        if [ -n "${OUTPUT_LINK}" ]; then
          nix_cmd="$nix_cmd -o ${OUTPUT_LINK}"
        fi

        # Add extra args based on build type or custom args
        if [ -n "${EXTRA_ARGS}" ]; then
          nix_cmd="$nix_cmd ${EXTRA_ARGS}"
        fi

        # Execute build — split stderr (nix messages) from stdout (builder output)
        eval "$nix_cmd" \
          > >(tee build.log) \
          2> >(tee /tmp/nix-build-err.log >&2) || {

          {
            echo 'error-log<<EOF_ERROR_LOG'
            drv=$(grep "For full logs, run" /tmp/nix-build-err.log | grep -oE '/nix/store/[^ ]+\.drv' | head -1)
            if [ -n "$drv" ]; then
              nix log "$drv"
            else
              cat /tmp/nix-build-err.log
            fi
            echo 'EOF_ERROR_LOG'
          } >> $GITHUB_OUTPUT

          build_end=$(date +%s)
          build_duration=$((build_end - build_start))
          echo "build_duration=$build_duration" >> $GITHUB_OUTPUT

          exit 1
        }

        build_end=$(date +%s)
        build_duration=$((build_end - build_start))
        echo "build_duration=$build_duration" >> $GITHUB_OUTPUT
