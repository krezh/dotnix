---
name: "Nix Build"
description: "Build a Nix flake target with standardized error capture and logging"
author: "krezh"

inputs:
  target:
    description: "Flake target to build (e.g., package-name or top.hostname)"
    required: true
  build-type:
    description: "Type of build (package or system)"
    required: true
  extra-args:
    description: "Extra nix build arguments"
    required: false
    default: ""
  output-link:
    description: "Path for the result symlink (-o flag)"
    required: false
    default: ""

outputs:
  success:
    description: "Whether the build succeeded"
    value: ${{ steps.build.outcome == 'success' }}
  build_duration:
    description: "Build duration in seconds"
    value: ${{ steps.build.outputs.build_duration }}

runs:
  using: "composite"
  steps:
    - name: Build ${{ inputs.build-type }}
      id: build
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        OUTPUT_LINK: ${{ inputs.output-link }}
        EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -o pipefail
        build_start=$(date +%s)
        trap 'echo "build_duration=$(( $(date +%s) - build_start ))" >> "$GITHUB_OUTPUT"' EXIT

        nix_cmd="nix build --fallback --no-write-lock-file --log-format raw \".#${INPUT_TARGET}\""

        if [ -n "${OUTPUT_LINK}" ]; then
          nix_cmd="$nix_cmd -o ${OUTPUT_LINK}"
        fi

        if [ -n "${EXTRA_ARGS}" ]; then
          nix_cmd="$nix_cmd ${EXTRA_ARGS}"
        fi

        eval "$nix_cmd" \
          > >(tee build.log) \
          2> >(tee /tmp/nix-build-err.log >&2)
