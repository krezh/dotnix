[package]
name = "optiman"
version = "0.1.0"
edition = "2021"
authors = ["krezh"]
description = "GTK4 manager for OptiScaler upscaling mod for Steam games"

[dependencies]
# GTK4 & libadwaita
gtk4 = { version = "0.9", features = ["v4_12"] }
libadwaita = { version = "0.7", features = ["v1_5"] }
glib = "0.22"
gio = "0.22"

# VDF parsing for Steam files
keyvalues-parser = "0.2"
keyvalues-serde = "0.2"

# HTTP for GitHub API & downloads
reqwest = { version = "0.13", features = ["json", "stream", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }
futures-util = "0.3"

# JSON serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# INI parsing for OptiScaler.ini
ini = "1.3"

# File operations
zip = "8.0"
sevenz-rust = "0.6"
walkdir = "2"
tempfile = "3"

# Error handling
anyhow = "1"
thiserror = "2"

# DateTime
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Directories
dirs = "6.0"

[[bin]]
name = "optiman"
path = "src/main.rs"
