[package]
name = "ncd"
version = "0.1.0"
edition = "2024"

[lib]
name = "nix_closure_diff"
path = "src/lib.rs"

[[bin]]
name = "ncd"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
derive_more = { version = "2.0", features = ["full"] }
diff = "0.1"
itertools = "0.14"
log = "0.4"
env_logger = "0.11"
pathfinding = "4.14"
regex = "1.11"
rusqlite = { version = "0.38", features = ["bundled"] }
size = "0.5"
unicode-width = "0.2"
yansi = { version = "1.0", features = ["detect-env", "detect-tty"] }
clap-verbosity-flag = "3.0"
ouroboros = "0.18"
