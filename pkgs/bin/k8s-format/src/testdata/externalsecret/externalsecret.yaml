---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: test-secret
  data:
    - secretKey: password
      remoteRef:
        key: secret/test
        property: password
